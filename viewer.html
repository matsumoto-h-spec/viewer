<!DOCTYPE html>
<html>
<head>
    <title>Draw.io Notion Connector</title>
    <style>
        body, html, iframe { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #f5f5f5; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; color: #666; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div id="msg">図面データを読み込んでいます...</div>
    <iframe id="drawio-frame" src="https://viewer.diagrams.net/?embed=1&proto=json&spin=1"></iframe>

    <script>
        const iframe = document.getElementById('drawio-frame');
        const msg = document.getElementById('msg');
        
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        // あなたのGitHubのRaw URL
        const xmlUrl = 'https://raw.githubusercontent.com/matsumoto-h-spec/viewer/refs/heads/main/index.xml';

        window.addEventListener('message', async function(evt) {
            if (evt.data.length < 1) return;
            const data = JSON.parse(evt.data);

            // 1. Draw.ioが起動完了（init）したとき
            if (data.event === 'init') {
                try {
                    // 2. GitHubからXMLファイルを自力で取得
                    const response = await fetch(xmlUrl);
                    const xmlText = await response.text();

                    // 3. Draw.ioに「この図面を表示して」と命令(load)
                    iframe.contentWindow.postMessage(JSON.stringify({
                        action: 'load',
                        xml: xmlText
                    }), '*');

                    // 4. 部屋名の指定があれば、ズームと選択を実行
                    if (roomName) {
                        msg.innerText = roomName + " を探しています...";
                        // 描画が安定するまで少し待機（800ms）
                        setTimeout(() => {
                            // ズーム（直接アクションを送ります）
                            iframe.contentWindow.postMessage(JSON.stringify({
                                action: 'scroll', 
                                label: roomName, 
                                padding: 150 
                            }), '*');

                            // 選択（青枠表示）
                            iframe.contentWindow.postMessage(JSON.stringify({
                                action: 'select', 
                                label: roomName 
                            }), '*');
                            
                            msg.style.display = 'none';
                        }, 800);
                    } else {
                        msg.style.display = 'none';
                    }
                } catch (e) {
                    msg.innerText = "エラー：図面データの取得に失敗しました。";
                    console.error(e);
                }
            }
        });
    </script>
</body>
</html>
