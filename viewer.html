<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Floor Viewer</title>
  <style>
    body { margin: 0; }
    iframe { width: 100vw; height: 100vh; border: none; }
  </style>
</head>
<body>
<iframe id="drawio" src=""></iframe>

<script>
  const params = new URLSearchParams(location.search);
  const roomName = params.get('room'); // 例: "会議室A"

  // ① draw.ioにdiagram.xmlを読み込ませる
  const diagramUrl = encodeURIComponent(
    'https://matsumoto-h-spec.github.io//index.xml'
  );
  document.getElementById('drawio').src =
    `https://embed.diagrams.net/?url=${diagramUrl}&ui=min&toolbar=0`;

  // ② iframeの準備完了後に部屋を選択・ズーム
  window.addEventListener('message', (e) => {
    if (e.data === 'ready' || e.data?.event === 'init') {
      selectRoom(roomName);
    }
  });

  function selectRoom(name) {
    const iframe = document.getElementById('drawio');

    // XMLをfetchして部屋名に一致するcell IDを探す
    fetch('./diagram.xml')
      .then(r => r.text())
      .then(xml => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xml, 'text/xml');
        const cells = doc.querySelectorAll('mxCell');
        let targetId = null;

        cells.forEach(cell => {
          if (cell.getAttribute('value') === name) {
            targetId = cell.getAttribute('id');
          }
        });

        if (!targetId) return;

        // ③ postMessageで選択 → ズーム
        iframe.contentWindow.postMessage(
          JSON.stringify({ action: 'select', cells: [targetId] }),
          '*'
        );
        // ズームはscrollToPageで代替 or カスタム実装
      });
  }
</script>
</body>
</html>
