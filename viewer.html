<!DOCTYPE html>
<html>
<head>
    <title>Draw.io Notion Connector</title>
    <style>
        body, html, iframe { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #f5f5f5; }
        #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; color: #666; }
    </style>
</head>
<body>
    <div id="msg">図面を読み込んでいます...</div>
    <iframe id="drawio-frame" src="https://viewer.diagrams.net/?embed=1&proto=json&spin=1"></iframe>

    <script>
        const iframe = document.getElementById('drawio-frame');
        const msg = document.getElementById('msg');
        
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        // あなたのGitHub上のXMLのURL（Raw URL）
        const xmlUrl = 'https://raw.githubusercontent.com/matsumoto-h-spec/viewer/refs/heads/main/index.xml';

        window.addEventListener('message', async function(evt) {
            if (evt.data.length < 1) return;
            const data = JSON.parse(evt.data);

            // 1. Draw.ioの準備ができたら(init)
            if (data.event === 'init') {
                msg.innerText = "データを転送中...";
                
                try {
                    // 2. 自力でGitHubからXMLをダウンロードする
                    const response = await fetch(xmlUrl);
                    const xmlText = await response.text();

                    // 3. ダウンロードしたXMLをDraw.ioに「これ表示して」と渡す(load)
                    iframe.contentWindow.postMessage(JSON.stringify({
                        action: 'load',
                        xml: xmlText
                    }), '*');

                    // 4. 表示が終わったらズームと選択を実行
                    if (roomName) {
                        // 少しだけ描画待ちの時間を置く（0.5秒）
                        setTimeout(() => {
                            msg.style.display = 'none';
                            // ズーム
                            iframe.contentWindow.postMessage(JSON.stringify({
                                action: 'post',
                                message: { action: 'scroll', label: roomName, padding: 150 }
                            }), '*');
                            // 選択
                            iframe.contentWindow.postMessage(JSON.stringify({
                                action: 'post',
                                message: { action: 'select', label: roomName }
                            }), '*');
                        }, 500);
                    }
                } catch (e) {
                    msg.innerText = "エラーが発生しました。URLを確認してください。";
                    console.error(e);
                }
            }
        });
    </script>
</body>
</html>
