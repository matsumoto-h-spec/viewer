<!DOCTYPE html>
<html>
<head>
    <title>Draw.io Notion Connector</title>
    <style>
        body, html, iframe { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #ffffff; }
        #status { position: fixed; top: 10px; left: 10px; font-family: sans-serif; font-size: 12px; color: #888; z-index: 10; background: rgba(255,255,255,0.7); padding: 4px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="status">図面を準備中...</div>
    <iframe id="drawio-frame" src="https://raw.githubusercontent.com/matsumoto-h-spec/viewer/main/index.xml"></iframe>

    <script>
        const iframe = document.getElementById('drawio-frame');
        const status = document.getElementById('status');
        
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = decodeURIComponent(urlParams.get('room') || '');
        
        // 正確なRaw URLを指定
        const xmlUrl = 'https://raw.githubusercontent.com/matsumoto-h-spec/viewer/main/index.xml';

        window.addEventListener('message', async function(evt) {
            if (evt.data.length < 1) return;
            const data = JSON.parse(evt.data);

            // 1. Draw.io起動
            if (data.event === 'init') {
                status.innerText = "データを取得中...";
                try {
                    const response = await fetch(xmlUrl);
                    const xmlText = await response.text();

                    // プログラムから図面を流し込む
                    iframe.contentWindow.postMessage(JSON.stringify({
                        action: 'load', xml: xmlText
                    }), '*');
                } catch (e) {
                    status.innerText = "エラー：図面の取得に失敗";
                }
            }

            // 2. 図面描画完了後にズーム実行
            if (data.event === 'render' && roomName) {
                status.innerText = roomName + " へズームします...";
                
                setTimeout(() => {
                    // 選択
                    iframe.contentWindow.postMessage(JSON.stringify({
                        action: 'select',
                        tags: [roomName]
                    }), '*');

                    // ズーム
                    iframe.contentWindow.postMessage(JSON.stringify({
                        action: 'scroll',
                        tags: [roomName],
                        padding: 100
                    }), '*');

                    status.style.display = 'none';
                }, 500);
            }
        });
    </script>
</body>
</html>
